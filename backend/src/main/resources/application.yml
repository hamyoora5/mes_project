# 서버 자체 실행 포트입니다.
server:
  port: 8002

# Spring Boot 애플리케이션 공통 설정입니다.
spring:
  application:
    name: mes-backend
  # 로컬 Docker PostgreSQL 연결 정보입니다.
  datasource:
    url: jdbc:postgresql://localhost:25432/mes_db
    username: mes_user
    password: mes_pass
  # 현재 프로젝트는 빠른 프로토타이핑을 위해 JPA 자동 스키마 갱신을 사용합니다.
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

# SQL 로그를 확인해 생산/품질 흐름이 DB에 어떻게 반영되는지 추적할 수 있습니다.
logging:
  level:
    org.hibernate.SQL: debug

# 애플리케이션 사용자 정의 설정입니다.
app:
  # React 개발 서버에서 오는 브라우저 요청을 허용합니다.
  cors:
    allowed-origins: http://localhost:3001
  # 로컬 시연 및 검증을 위해 샘플 데이터를 자동 적재합니다.
  seed:
    enabled: true
