services:
  mes_db:
    image: postgres:15
    container_name: mes_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  mes_redis:
    image: redis:7
    container_name: mes_redis
    ports:
      - "${REDIS_PORT}:6379"
